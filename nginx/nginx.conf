server {
    listen 80;

    location /api/product/ {
        proxy_pass http://product-service:3001/;
    }

    location /api/food/ {
        proxy_pass http://food-service:3002/;
    }

    location /api/user/ {
        proxy_pass http://user-service:3003/;
    }

    location / {
        proxy_pass http://frontend:3000/;
    }
}